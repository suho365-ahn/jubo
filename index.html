<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1a56a4" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="주보노트" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <title>주보노트</title>
  <style>
    /* ── 리셋 & 기본 ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue:    #1a56a4;
      --blue-l:  #2d6bc4;
      --blue-d:  #0f3d7a;
      --accent:  #e8a020;
      --bg:      #f4f6fb;
      --card:    #ffffff;
      --text:    #1a1f2e;
      --sub:     #5a6378;
      --border:  #dce2ef;
      --danger:  #d63031;
      --green:   #00b894;
      --radius:  14px;
      --shadow:  0 2px 12px rgba(26,86,164,.12);
    }
    html, body { height: 100%; font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif; background: var(--bg); color: var(--text); }

    /* ── 앱 레이아웃 ── */
    #app { display: flex; flex-direction: column; height: 100%; max-width: 480px; margin: 0 auto; position: relative; background: var(--bg); }

    /* ── 헤더 ── */
    header {
      background: linear-gradient(135deg, var(--blue-d), var(--blue));
      color: #fff;
      padding: 52px 20px 18px;
      display: flex; align-items: center; gap: 12px;
      position: relative;
      box-shadow: 0 3px 16px rgba(26,86,164,.3);
    }
    header .logo { font-size: 26px; }
    header h1 { font-size: 20px; font-weight: 700; letter-spacing: -.3px; }
    header p  { font-size: 12px; opacity: .75; margin-top: 2px; }
    #header-actions { margin-left: auto; display: flex; gap: 8px; }
    .hbtn {
      background: rgba(255,255,255,.18);
      border: none; border-radius: 8px;
      color: #fff; font-size: 18px;
      width: 38px; height: 38px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background .15s;
    }
    .hbtn:active { background: rgba(255,255,255,.35); }

    /* ── 탭바 ── */
    nav {
      background: var(--card);
      border-bottom: 1.5px solid var(--border);
      display: flex;
    }
    nav button {
      flex: 1; padding: 12px 0; border: none; background: none;
      font-size: 13px; font-weight: 600; color: var(--sub);
      cursor: pointer; position: relative; transition: color .15s;
    }
    nav button.active { color: var(--blue); }
    nav button.active::after {
      content: ''; position: absolute; bottom: 0; left: 16%; right: 16%;
      height: 2.5px; background: var(--blue); border-radius: 2px;
    }
    nav button span { font-size: 16px; display: block; margin-bottom: 2px; }

    /* ── 콘텐츠 ── */
    main { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    .tab { display: none; padding: 16px; }
    .tab.active { display: block; }

    /* ── 카드 ── */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      margin-bottom: 14px;
    }

    /* ── 촬영 탭 ── */
    .camera-zone {
      aspect-ratio: 3/4;
      background: #111;
      border-radius: var(--radius);
      overflow: hidden;
      position: relative;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 14px;
      cursor: pointer;
    }
    .camera-zone video, .camera-zone img {
      width: 100%; height: 100%; object-fit: cover;
    }
    .camera-zone .placeholder {
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      color: #aaa; font-size: 14px;
    }
    .camera-zone .placeholder span { font-size: 48px; }
    .camera-zone .cam-hint {
      position: absolute; bottom: 12px; left: 0; right: 0;
      text-align: center; font-size: 11px; color: rgba(255,255,255,.7);
    }
    .camera-overlay {
      position: absolute; inset: 0; background: rgba(0,0,0,.0);
      display: none; align-items: center; justify-content: center;
    }

    .btn-row { display: flex; gap: 10px; margin-bottom: 14px; }
    .btn {
      flex: 1; padding: 14px 0; border: none; border-radius: 10px;
      font-size: 14px; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      transition: opacity .15s, transform .1s;
    }
    .btn:active { opacity: .8; transform: scale(.97); }
    .btn-primary   { background: var(--blue); color: #fff; }
    .btn-secondary { background: var(--border); color: var(--text); }
    .btn-accent    { background: var(--accent); color: #fff; }
    .btn-danger    { background: var(--danger); color: #fff; }
    .btn-green     { background: var(--green);  color: #fff; }
    .btn-outline   { background: none; border: 1.5px solid var(--blue); color: var(--blue); }
    .btn-sm { padding: 8px 14px; font-size: 13px; border-radius: 8px; }

    /* ── 메모 입력 ── */
    .memo-box {
      width: 100%; min-height: 120px;
      padding: 14px; font-size: 15px; line-height: 1.6;
      border: 1.5px solid var(--border); border-radius: 10px;
      resize: vertical; outline: none; color: var(--text);
      font-family: inherit; background: var(--card);
      transition: border-color .2s;
    }
    .memo-box:focus { border-color: var(--blue); }

    /* ── 태그 ── */
    .tag-row { display: flex; flex-wrap: wrap; gap: 7px; margin: 10px 0; }
    .tag {
      padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 600;
      border: 1.5px solid transparent; cursor: pointer; transition: all .15s;
    }
    .tag.off { background: var(--bg); border-color: var(--border); color: var(--sub); }
    .tag.on  { background: var(--blue); color: #fff; border-color: var(--blue); }

    /* ── 날짜 ── */
    .date-chip {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--blue); color: #fff;
      border-radius: 20px; padding: 5px 14px;
      font-size: 13px; font-weight: 700;
      margin-bottom: 12px;
    }

    /* ── 저장 카드 목록 ── */
    .entry-card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      margin-bottom: 14px;
      overflow: hidden;
      cursor: pointer;
      transition: transform .15s, box-shadow .15s;
    }
    .entry-card:active { transform: scale(.99); box-shadow: none; }
    .entry-img {
      width: 100%; aspect-ratio: 16/9;
      object-fit: cover; display: block;
    }
    .entry-img.no-img {
      aspect-ratio: unset; height: 56px;
      background: linear-gradient(135deg, #e8eef9, #d0daf0);
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
    }
    .entry-body { padding: 14px; }
    .entry-top { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .entry-date { font-size: 12px; color: var(--sub); }
    .entry-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-left: auto; }
    .entry-tag {
      font-size: 11px; padding: 2px 8px; border-radius: 12px;
      background: #e8eef9; color: var(--blue); font-weight: 600;
    }
    .entry-title { font-size: 16px; font-weight: 700; margin-bottom: 5px; }
    .entry-memo  { font-size: 13px; color: var(--sub); line-height: 1.5; white-space: pre-wrap; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .empty-state { text-align: center; padding: 60px 20px; color: var(--sub); }
    .empty-state span { font-size: 52px; display: block; margin-bottom: 14px; }

    /* ── 상세 모달 ── */
    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,.55);
      z-index: 100; display: none; align-items: flex-end;
      backdrop-filter: blur(3px);
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      background: var(--card);
      border-radius: var(--radius) var(--radius) 0 0;
      width: 100%; max-width: 480px; margin: 0 auto;
      max-height: 92vh; overflow-y: auto;
      padding: 0 0 40px;
      animation: slideUp .25s ease;
    }
    @keyframes slideUp { from { transform: translateY(60px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .modal-handle {
      width: 40px; height: 4px; border-radius: 3px;
      background: var(--border); margin: 12px auto 0;
    }
    .modal-img { width: 100%; max-height: 280px; object-fit: contain; background: #111; display: block; }
    .modal-body { padding: 16px; }
    .modal-title { font-size: 18px; font-weight: 700; margin: 8px 0; }
    .modal-meta { font-size: 13px; color: var(--sub); margin-bottom: 12px; }
    .modal-memo { font-size: 15px; line-height: 1.75; white-space: pre-wrap; color: var(--text); }
    .modal-actions { display: flex; gap: 10px; padding: 0 16px; margin-top: 14px; }

    /* ── 설정 탭 ── */
    .settings-section { margin-bottom: 20px; }
    .settings-label { font-size: 11px; font-weight: 700; color: var(--sub); letter-spacing: .8px; text-transform: uppercase; margin-bottom: 8px; padding-left: 4px; }
    .settings-row {
      background: var(--card); border-radius: 10px; box-shadow: var(--shadow);
      display: flex; align-items: center; padding: 15px 16px;
      gap: 12px; margin-bottom: 2px;
    }
    .settings-row:first-of-type { border-radius: 10px 10px 0 0; }
    .settings-row + .settings-row { border-top: 1px solid var(--border); border-radius: 0; }
    .settings-row:last-of-type { border-radius: 0 0 10px 10px; }
    .settings-icon { font-size: 20px; width: 32px; text-align: center; }
    .settings-info { flex: 1; }
    .settings-info b { font-size: 14px; display: block; }
    .settings-info small { color: var(--sub); font-size: 12px; }
    .settings-action { color: var(--sub); font-size: 18px; }
    .badge { background: var(--blue); color: #fff; font-size: 11px; font-weight: 700; border-radius: 12px; padding: 2px 8px; }

    /* ── 토스트 ── */
    #toast {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
      background: rgba(26,31,46,.92); color: #fff; padding: 12px 22px;
      border-radius: 24px; font-size: 14px; font-weight: 600;
      z-index: 999; opacity: 0; transition: opacity .25s; pointer-events: none;
      white-space: nowrap;
    }
    #toast.show { opacity: 1; }

    /* ── FAB ── */
    #fab {
      position: fixed; bottom: 24px; right: 20px;
      width: 58px; height: 58px; border-radius: 50%;
      background: var(--blue); color: #fff; font-size: 26px;
      border: none; cursor: pointer;
      box-shadow: 0 4px 18px rgba(26,86,164,.45);
      display: flex; align-items: center; justify-content: center;
      z-index: 50; transition: transform .15s;
    }
    #fab:active { transform: scale(.9); }

    /* ── 입력 탭 폼 ── */
    label.field-label { font-size: 13px; font-weight: 700; color: var(--sub); display: block; margin-bottom: 6px; margin-top: 14px; }
    input[type=text], input[type=date] {
      width: 100%; padding: 12px 14px; border: 1.5px solid var(--border);
      border-radius: 10px; font-size: 14px; outline: none;
      color: var(--text); font-family: inherit; background: var(--card);
      transition: border-color .2s;
    }
    input:focus { border-color: var(--blue); }

    /* 검색창 */
    .search-wrap { position: relative; margin-bottom: 14px; }
    .search-wrap input {
      padding-left: 40px;
      background: var(--card);
    }
    .search-wrap .si { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); font-size: 17px; color: var(--sub); }

    /* 필터 바 */
    .filter-row { display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 14px; }
    .filter-chip {
      padding: 5px 12px; border-radius: 16px; font-size: 12px; font-weight: 600;
      border: 1.5px solid var(--border); background: var(--card); color: var(--sub);
      cursor: pointer; transition: all .15s;
    }
    .filter-chip.on { background: var(--blue); border-color: var(--blue); color: #fff; }
  </style>
</head>
<body>
<div id="app">

  <!-- 헤더 -->
  <header>
    <div class="logo">📋</div>
    <div>
      <h1>주보노트</h1>
      <p>교회 주보 사진 & 메모</p>
    </div>
    <div id="header-actions">
      <button class="hbtn" id="searchBtn" title="검색">🔍</button>
      <button class="hbtn" id="exportBtn" title="내보내기">📤</button>
    </div>
  </header>

  <!-- 탭 -->
  <nav>
    <button class="active" data-tab="list"><span>📚</span>목록</button>
    <button data-tab="capture"><span>📷</span>촬영·입력</button>
    <button data-tab="settings"><span>⚙️</span>설정</button>
  </nav>

  <main>
    <!-- ── 목록 탭 ── -->
    <div class="tab active" id="tab-list">
      <div class="search-wrap" id="searchArea" style="display:none;">
        <span class="si">🔍</span>
        <input type="text" id="searchInput" placeholder="제목, 메모, 태그 검색…" />
      </div>
      <div class="filter-row" id="filterRow"></div>
      <div id="entryList"></div>
    </div>

    <!-- ── 촬영·입력 탭 ── -->
    <div class="tab" id="tab-capture">

      <!-- 촬영 영역 -->
      <div class="camera-zone" id="cameraZone">
        <div class="placeholder" id="camPlaceholder">
          <span>📷</span>
          <p>탭하여 촬영하거나<br>사진을 선택하세요</p>
        </div>
        <video id="videoEl" style="display:none;" autoplay playsinline muted></video>
        <img id="previewImg" style="display:none;" alt="미리보기" />
        <div class="cam-hint" id="camHint">탭하여 시작</div>
      </div>

      <!-- 버튼 -->
      <div class="btn-row" id="camBtnRow">
        <button class="btn btn-primary" id="startCamBtn">📷 카메라 열기</button>
        <button class="btn btn-secondary" id="uploadBtn">🖼️ 갤러리</button>
      </div>
      <div class="btn-row" id="shootRow" style="display:none;">
        <button class="btn btn-accent" id="shootBtn">⬤ 촬영</button>
        <button class="btn btn-secondary" id="cancelCamBtn">✕ 취소</button>
      </div>
      <div class="btn-row" id="retakeRow" style="display:none;">
        <button class="btn btn-secondary" id="retakeBtn">🔄 다시찍기</button>
        <button class="btn btn-green"     id="confirmImgBtn">✓ 사용</button>
      </div>

      <!-- 숨김 input -->
      <input type="file" id="fileInput" accept="image/*" style="display:none;" />

      <!-- 메모 입력 폼 -->
      <div class="card" id="memoForm">
        <div style="padding:16px;">
          <label class="field-label">📅 날짜</label>
          <input type="date" id="entryDate" />

          <label class="field-label">📝 제목 (선택)</label>
          <input type="text" id="entryTitle" placeholder="예: 2025년 6월 22일 주보" maxlength="60" />

          <label class="field-label">🏷️ 태그</label>
          <div class="tag-row" id="tagRow"></div>

          <label class="field-label" style="display:flex;align-items:center;justify-content:space-between;">
            <span>💬 메모</span>
            <button class="btn btn-outline btn-sm" id="openBibleBtn" style="font-size:12px;padding:5px 12px;">📖 성경 구절 검색</button>
          </label>
          <textarea class="memo-box" id="memoText" placeholder="설교 요점, 기도 제목, 광고 내용 등을 자유롭게 적어보세요…"></textarea>

          <div style="margin-top:14px;">
            <button class="btn btn-primary" id="saveBtn" style="width:100%;font-size:16px;padding:16px;">💾 저장하기</button>
          </div>
        </div>
      </div>
    </div>

    <!-- ── 설정 탭 ── -->
    <div class="tab" id="tab-settings">
      <div class="settings-section">
        <div class="settings-label">저장 현황</div>
        <div class="settings-row">
          <div class="settings-icon">📚</div>
          <div class="settings-info"><b>저장된 주보</b><small>총 기록 수</small></div>
          <div class="settings-action badge" id="totalCount">0</div>
        </div>
        <div class="settings-row">
          <div class="settings-icon">📸</div>
          <div class="settings-info"><b>사진 포함</b><small>이미지가 있는 기록</small></div>
          <div class="settings-action badge" id="photoCount">0</div>
        </div>
      </div>

      <div class="settings-section">
        <div class="settings-label">태그 관리</div>
        <div class="settings-row" id="manageTagsRow" style="cursor:pointer;">
          <div class="settings-icon">🏷️</div>
          <div class="settings-info"><b>태그 편집</b><small>태그를 추가하거나 삭제합니다</small></div>
          <div class="settings-action">›</div>
        </div>
      </div>

      <div class="settings-section">
        <div class="settings-label">데이터</div>
        <div class="settings-row" id="exportJsonRow" style="cursor:pointer;">
          <div class="settings-icon">📤</div>
          <div class="settings-info"><b>JSON 내보내기</b><small>전체 데이터를 파일로 저장</small></div>
          <div class="settings-action">›</div>
        </div>
        <div class="settings-row" id="importJsonRow" style="cursor:pointer;">
          <div class="settings-icon">📥</div>
          <div class="settings-info"><b>JSON 불러오기</b><small>백업 파일에서 복원</small></div>
          <div class="settings-action">›</div>
        </div>
        <div class="settings-row" id="clearAllRow" style="cursor:pointer;">
          <div class="settings-icon">🗑️</div>
          <div class="settings-info"><b style="color:var(--danger)">전체 삭제</b><small>모든 기록을 지웁니다</small></div>
          <div class="settings-action">›</div>
        </div>
      </div>

      <div class="settings-section">
        <div class="settings-label">앱 정보</div>
        <div class="settings-row">
          <div class="settings-icon">ℹ️</div>
          <div class="settings-info"><b>주보노트</b><small>v1.0 — 교회 주보 사진 메모 앱</small></div>
        </div>
      </div>
    </div>
  </main>

  <!-- FAB (새 기록) -->
  <button id="fab" title="새 주보 기록">＋</button>

  <!-- 토스트 -->
  <div id="toast"></div>
</div>

<!-- 상세 모달 -->
<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <img class="modal-img" id="modalImg" style="display:none;" />
    <div class="modal-body">
      <div id="modalTags" class="tag-row" style="margin-top:4px;"></div>
      <div class="modal-title" id="modalTitle"></div>
      <div class="modal-meta" id="modalMeta"></div>
      <div class="modal-memo" id="modalMemo"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline btn-sm" id="modalEditBtn" style="flex:1;">✏️ 편집</button>
      <button class="btn btn-danger btn-sm" id="modalDeleteBtn" style="flex:1;">🗑️ 삭제</button>
      <button class="btn btn-secondary btn-sm" id="modalCloseBtn" style="flex:1;">✕ 닫기</button>
    </div>
  </div>
</div>

<!-- 태그 관리 모달 -->
<div class="modal-backdrop" id="tagModal">
  <div class="modal" style="padding-bottom:30px;">
    <div class="modal-handle"></div>
    <div class="modal-body">
      <div class="modal-title">🏷️ 태그 관리</div>
      <div style="margin:14px 0;" id="tagManageList"></div>
      <div style="display:flex;gap:8px;margin-top:10px;">
        <input type="text" id="newTagInput" placeholder="새 태그 이름" style="flex:1;" maxlength="12" />
        <button class="btn btn-primary btn-sm" id="addTagBtn">추가</button>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary btn-sm" id="tagModalClose" style="flex:1;">닫기</button>
    </div>
  </div>
</div>

<!-- 성경 검색 모달 -->
<div class="modal-backdrop" id="bibleModal">
  <div class="modal" style="padding-bottom:30px;max-height:92vh;">
    <div class="modal-handle"></div>
    <div class="modal-body" style="padding-bottom:0;">
      <div class="modal-title" style="margin-bottom:12px;">📖 성경 구절 검색</div>

      <!-- 책 선택 -->
      <label class="field-label">성경책</label>
      <div id="bibleBookGrid" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;max-height:140px;overflow-y:auto;"></div>

      <!-- 장 / 절 입력 -->
      <div style="display:flex;gap:8px;margin-bottom:10px;">
        <div style="flex:1;">
          <label class="field-label">장</label>
          <input type="number" id="bibleChapter" min="1" max="150" placeholder="예: 3" style="width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:15px;outline:none;font-family:inherit;" />
        </div>
        <div style="flex:1;">
          <label class="field-label">절 범위 (선택)</label>
          <input type="text" id="bibleVerse" placeholder="예: 16 또는 16-17" style="width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:15px;outline:none;font-family:inherit;" />
        </div>
      </div>
      <button class="btn btn-primary" id="bibleSearchBtn" style="width:100%;margin-bottom:12px;">🔍 구절 가져오기</button>

      <!-- 결과 -->
      <div id="bibleResult" style="display:none;">
        <div id="bibleVerseText" style="background:var(--bg);border-radius:10px;padding:14px;font-size:15px;line-height:1.8;color:var(--text);margin-bottom:10px;border:1.5px solid var(--border);"></div>
        <div style="display:flex;gap:8px;">
          <button class="btn btn-green" id="bibleInsertBtn" style="flex:1;">✓ 메모에 삽입</button>
          <button class="btn btn-secondary btn-sm" id="bibleCopyBtn" style="flex:1;">📋 복사</button>
        </div>
      </div>
      <div id="bibleLoading" style="display:none;text-align:center;padding:20px;color:var(--sub);font-size:14px;">불러오는 중…</div>
      <div id="bibleError"   style="display:none;text-align:center;padding:16px;color:var(--danger);font-size:13px;"></div>
    </div>
    <div class="modal-actions" style="margin-top:14px;">
      <button class="btn btn-secondary btn-sm" id="bibleModalClose" style="flex:1;">닫기</button>
    </div>
  </div>
</div>

<!-- 숨김 import input -->
<input type="file" id="importInput" accept=".json" style="display:none;" />

<script>
// ──────────────────────────────────────────────
//  STATE
// ──────────────────────────────────────────────
const STORE_KEY   = 'jubo_entries';
const TAGS_KEY    = 'jubo_tags';
const DEFAULT_TAGS = ['설교','기도','광고','감사','성경봉독','헌신'];

let entries   = JSON.parse(localStorage.getItem(STORE_KEY)  || '[]');
let allTags   = JSON.parse(localStorage.getItem(TAGS_KEY)   || 'null') || [...DEFAULT_TAGS];
let selTags   = [];           // 현재 입력폼 선택 태그
let filterTag = null;         // 목록 필터 태그
let searchQ   = '';
let currentEntry = null;      // 상세보기 대상
let capturedImg  = null;      // base64
let stream       = null;      // MediaStream
let editId       = null;      // 편집 중 ID

function saveEntries() { localStorage.setItem(STORE_KEY, JSON.stringify(entries)); }
function saveTags()    { localStorage.setItem(TAGS_KEY,  JSON.stringify(allTags)); }

// ──────────────────────────────────────────────
//  TOAST
// ──────────────────────────────────────────────
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

// ──────────────────────────────────────────────
//  TABS
// ──────────────────────────────────────────────
document.querySelectorAll('nav button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
    if (btn.dataset.tab === 'settings') updateSettingsStats();
    if (btn.dataset.tab === 'list') renderList();
  });
});

// FAB → 촬영 탭
document.getElementById('fab').addEventListener('click', () => {
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector('[data-tab="capture"]').classList.add('active');
  document.getElementById('tab-capture').classList.add('active');
  resetForm();
});

// ──────────────────────────────────────────────
//  CAMERA
// ──────────────────────────────────────────────
const cameraZone   = document.getElementById('cameraZone');
const videoEl      = document.getElementById('videoEl');
const previewImg   = document.getElementById('previewImg');
const camPlaceholder = document.getElementById('camPlaceholder');
const camHint      = document.getElementById('camHint');
const camBtnRow    = document.getElementById('camBtnRow');
const shootRow     = document.getElementById('shootRow');
const retakeRow    = document.getElementById('retakeRow');
const fileInput    = document.getElementById('fileInput');

function showState(s) {
  // s: 'idle' | 'live' | 'preview'
  camPlaceholder.style.display = s==='idle'   ? 'flex'  : 'none';
  videoEl.style.display        = s==='live'   ? 'block' : 'none';
  previewImg.style.display     = s==='preview'? 'block' : 'none';
  camBtnRow.style.display      = s==='idle'   ? 'flex'  : 'none';
  shootRow.style.display       = s==='live'   ? 'flex'  : 'none';
  retakeRow.style.display      = s==='preview'? 'flex'  : 'none';
  camHint.style.display        = s==='idle'   ? 'block' : 'none';
}

async function startCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width:{ideal:1280}, height:{ideal:960} }, audio: false });
    videoEl.srcObject = stream;
    showState('live');
  } catch(e) {
    toast('카메라를 열 수 없습니다. 갤러리를 이용해 주세요.');
    fileInput.click();
  }
}

function stopCamera() {
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
}

function shoot() {
  const canvas = document.createElement('canvas');
  canvas.width  = videoEl.videoWidth;
  canvas.height = videoEl.videoHeight;
  canvas.getContext('2d').drawImage(videoEl, 0, 0);
  capturedImg = canvas.toDataURL('image/jpeg', .88);
  previewImg.src = capturedImg;
  stopCamera();
  showState('preview');
}

document.getElementById('startCamBtn').addEventListener('click', startCamera);
document.getElementById('shootBtn').addEventListener('click', shoot);
document.getElementById('cancelCamBtn').addEventListener('click', () => { stopCamera(); showState('idle'); });
document.getElementById('retakeBtn').addEventListener('click', () => { capturedImg=null; startCamera(); });
document.getElementById('confirmImgBtn').addEventListener('click', () => { toast('사진이 선택되었습니다!'); });

document.getElementById('uploadBtn').addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    capturedImg = ev.target.result;
    previewImg.src = capturedImg;
    showState('preview');
  };
  reader.readAsDataURL(file);
  fileInput.value = '';
});

// cameraZone 탭 → idle 상태면 카메라 시작
cameraZone.addEventListener('click', () => {
  if (videoEl.style.display === 'none' && previewImg.style.display === 'none') startCamera();
});

// ──────────────────────────────────────────────
//  FORM — 태그
// ──────────────────────────────────────────────
function renderTagRow() {
  const row = document.getElementById('tagRow');
  row.innerHTML = '';
  allTags.forEach(t => {
    const on = selTags.includes(t);
    const el = document.createElement('span');
    el.className = 'tag ' + (on ? 'on' : 'off');
    el.textContent = t;
    el.addEventListener('click', () => {
      selTags = on ? selTags.filter(x => x!==t) : [...selTags, t];
      renderTagRow();
    });
    row.appendChild(el);
  });
}

// ──────────────────────────────────────────────
//  날짜 초기화
// ──────────────────────────────────────────────
function todayStr() {
  return new Date().toISOString().slice(0,10);
}
function nextSunday() {
  const d = new Date();
  const day = d.getDay();
  const diff = day === 0 ? 0 : 7 - day;
  d.setDate(d.getDate() + diff);
  return d.toISOString().slice(0,10);
}

// ──────────────────────────────────────────────
//  SAVE
// ──────────────────────────────────────────────
document.getElementById('saveBtn').addEventListener('click', () => {
  const date  = document.getElementById('entryDate').value || todayStr();
  const title = document.getElementById('entryTitle').value.trim() || formatDate(date) + ' 주보';
  const memo  = document.getElementById('memoText').value.trim();

  if (!capturedImg && !memo) { toast('사진이나 메모를 입력해 주세요.'); return; }

  if (editId) {
    const idx = entries.findIndex(e => e.id === editId);
    if (idx !== -1) {
      entries[idx] = { ...entries[idx], date, title, memo, tags: [...selTags], img: capturedImg };
      toast('수정되었습니다!');
    }
    editId = null;
  } else {
    entries.unshift({ id: Date.now().toString(), date, title, memo, tags: [...selTags], img: capturedImg, created: new Date().toISOString() });
    toast('저장되었습니다! 📋');
  }

  saveEntries();
  resetForm();
  renderList();
  // 목록 탭으로 이동
  setTimeout(() => {
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelector('[data-tab="list"]').classList.add('active');
    document.getElementById('tab-list').classList.add('active');
  }, 400);
});

function resetForm() {
  capturedImg = null; editId = null;
  stopCamera();
  showState('idle');
  previewImg.src = '';
  document.getElementById('entryDate').value  = nextSunday();
  document.getElementById('entryTitle').value = '';
  document.getElementById('memoText').value   = '';
  selTags = [];
  renderTagRow();
}

// ──────────────────────────────────────────────
//  LIST
// ──────────────────────────────────────────────
function formatDate(str) {
  if (!str) return '';
  const [y,m,d] = str.split('-');
  return `${y}년 ${parseInt(m)}월 ${parseInt(d)}일`;
}

function renderFilterChips() {
  const row = document.getElementById('filterRow');
  row.innerHTML = '';
  const all = document.createElement('span');
  all.className = 'filter-chip' + (!filterTag ? ' on' : '');
  all.textContent = '전체';
  all.addEventListener('click', () => { filterTag=null; renderList(); });
  row.appendChild(all);

  const usedTags = [...new Set(entries.flatMap(e => e.tags||[]))];
  usedTags.forEach(t => {
    const c = document.createElement('span');
    c.className = 'filter-chip' + (filterTag===t ? ' on' : '');
    c.textContent = t;
    c.addEventListener('click', () => { filterTag = filterTag===t ? null : t; renderList(); });
    row.appendChild(c);
  });
}

function renderList() {
  renderFilterChips();
  const list = document.getElementById('entryList');
  let data = entries;
  if (filterTag) data = data.filter(e => (e.tags||[]).includes(filterTag));
  if (searchQ)   data = data.filter(e =>
    e.title.includes(searchQ) || e.memo.includes(searchQ) || (e.tags||[]).some(t => t.includes(searchQ))
  );

  if (!data.length) {
    list.innerHTML = `<div class="empty-state"><span>📭</span><p>${searchQ||filterTag ? '검색 결과가 없습니다.' : '아직 기록이 없습니다.<br>주보를 찍어 저장해 보세요!'}</p></div>`;
    return;
  }

  list.innerHTML = '';
  data.forEach(entry => {
    const card = document.createElement('div');
    card.className = 'entry-card';

    const tagHtml = (entry.tags||[]).map(t => `<span class="entry-tag">${t}</span>`).join('');
    const imgHtml = entry.img
      ? `<img class="entry-img" src="${entry.img}" loading="lazy" />`
      : `<div class="entry-img no-img">📋</div>`;

    card.innerHTML = `
      ${imgHtml}
      <div class="entry-body">
        <div class="entry-top">
          <span class="entry-date">📅 ${formatDate(entry.date)}</span>
          <div class="entry-tags">${tagHtml}</div>
        </div>
        <div class="entry-title">${entry.title}</div>
        ${entry.memo ? `<div class="entry-memo">${entry.memo}</div>` : ''}
      </div>`;
    card.addEventListener('click', () => openModal(entry));
    list.appendChild(card);
  });
}

// ──────────────────────────────────────────────
//  MODAL
// ──────────────────────────────────────────────
function openModal(entry) {
  currentEntry = entry;
  const mi = document.getElementById('modalImg');
  if (entry.img) { mi.src = entry.img; mi.style.display='block'; }
  else           { mi.style.display = 'none'; }
  document.getElementById('modalTitle').textContent = entry.title;
  document.getElementById('modalMeta').textContent  = '📅 ' + formatDate(entry.date);
  document.getElementById('modalMemo').textContent  = entry.memo || '(메모 없음)';
  const tRow = document.getElementById('modalTags');
  tRow.innerHTML = (entry.tags||[]).map(t=>`<span class="tag on" style="font-size:12px;padding:4px 12px;">${t}</span>`).join('');
  document.getElementById('modalBackdrop').classList.add('open');
}

document.getElementById('modalCloseBtn').addEventListener('click',  () => document.getElementById('modalBackdrop').classList.remove('open'));
document.getElementById('modalBackdrop').addEventListener('click', e => { if(e.target===document.getElementById('modalBackdrop')) document.getElementById('modalBackdrop').classList.remove('open'); });

document.getElementById('modalDeleteBtn').addEventListener('click', () => {
  if (!currentEntry) return;
  if (!confirm(`"${currentEntry.title}"\n이 기록을 삭제할까요?`)) return;
  entries = entries.filter(e => e.id !== currentEntry.id);
  saveEntries(); renderList();
  document.getElementById('modalBackdrop').classList.remove('open');
  toast('삭제되었습니다.');
});

document.getElementById('modalEditBtn').addEventListener('click', () => {
  if (!currentEntry) return;
  editId = currentEntry.id;
  capturedImg = currentEntry.img || null;

  document.getElementById('entryDate').value  = currentEntry.date || '';
  document.getElementById('entryTitle').value = currentEntry.title || '';
  document.getElementById('memoText').value   = currentEntry.memo || '';
  selTags = [...(currentEntry.tags||[])];

  if (capturedImg) { previewImg.src = capturedImg; showState('preview'); }
  else              { showState('idle'); }

  renderTagRow();
  document.getElementById('modalBackdrop').classList.remove('open');

  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector('[data-tab="capture"]').classList.add('active');
  document.getElementById('tab-capture').classList.add('active');
  toast('편집 모드입니다. 수정 후 저장하세요.');
});

// ──────────────────────────────────────────────
//  SEARCH
// ──────────────────────────────────────────────
document.getElementById('searchBtn').addEventListener('click', () => {
  const area = document.getElementById('searchArea');
  const isHidden = area.style.display === 'none';
  area.style.display = isHidden ? 'block' : 'none';
  if (isHidden) document.getElementById('searchInput').focus();
  else { searchQ=''; renderList(); }

  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector('[data-tab="list"]').classList.add('active');
  document.getElementById('tab-list').classList.add('active');
});

document.getElementById('searchInput').addEventListener('input', e => {
  searchQ = e.target.value.trim();
  renderList();
});

// ──────────────────────────────────────────────
//  EXPORT / IMPORT
// ──────────────────────────────────────────────
function exportJSON() {
  const blob = new Blob([JSON.stringify({entries, tags:allTags}, null, 2)], {type:'application/json'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = `jubo_backup_${todayStr()}.json`;
  a.click(); URL.revokeObjectURL(url);
  toast('내보내기 완료!');
}

document.getElementById('exportBtn').addEventListener('click', exportJSON);
document.getElementById('exportJsonRow').addEventListener('click', exportJSON);
document.getElementById('importJsonRow').addEventListener('click', () => document.getElementById('importInput').click());
document.getElementById('importInput').addEventListener('change', e => {
  const f = e.target.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = ev => {
    try {
      const d = JSON.parse(ev.target.result);
      if (d.entries) {
        if (!confirm(`${d.entries.length}개의 기록을 불러옵니다.\n기존 데이터에 추가됩니다. 계속할까요?`)) return;
        const ids = new Set(entries.map(e=>e.id));
        d.entries.filter(e=>!ids.has(e.id)).forEach(e=>entries.push(e));
        if (d.tags) allTags = [...new Set([...allTags, ...d.tags])];
        saveEntries(); saveTags(); renderList(); updateSettingsStats();
        toast(`${d.entries.length}개 기록을 불러왔습니다!`);
      }
    } catch { toast('파일을 읽을 수 없습니다.'); }
  };
  r.readAsText(f);
  document.getElementById('importInput').value = '';
});

// ──────────────────────────────────────────────
//  SETTINGS
// ──────────────────────────────────────────────
function updateSettingsStats() {
  document.getElementById('totalCount').textContent = entries.length;
  document.getElementById('photoCount').textContent = entries.filter(e=>e.img).length;
}

document.getElementById('clearAllRow').addEventListener('click', () => {
  if (!entries.length) { toast('삭제할 기록이 없습니다.'); return; }
  if (!confirm(`전체 ${entries.length}개 기록을 모두 삭제할까요?\n이 작업은 되돌릴 수 없습니다.`)) return;
  entries = []; saveEntries(); renderList(); updateSettingsStats();
  toast('전체 삭제 완료.');
});

// ──────────────────────────────────────────────
//  TAG MANAGE MODAL
// ──────────────────────────────────────────────
function renderTagManage() {
  const list = document.getElementById('tagManageList');
  list.innerHTML = '';
  allTags.forEach(t => {
    const row = document.createElement('div');
    row.style.cssText = 'display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);';
    row.innerHTML = `<span style="flex:1;font-size:14px;font-weight:600;">🏷️ ${t}</span>
      <button class="btn btn-danger btn-sm" style="padding:6px 10px;font-size:12px;">삭제</button>`;
    row.querySelector('button').addEventListener('click', () => {
      allTags = allTags.filter(x=>x!==t); saveTags(); renderTagManage(); renderTagRow();
    });
    list.appendChild(row);
  });
}

document.getElementById('manageTagsRow').addEventListener('click', () => {
  renderTagManage();
  document.getElementById('tagModal').classList.add('open');
});

document.getElementById('addTagBtn').addEventListener('click', () => {
  const val = document.getElementById('newTagInput').value.trim();
  if (!val) return;
  if (allTags.includes(val)) { toast('이미 있는 태그입니다.'); return; }
  allTags.push(val); saveTags(); renderTagManage(); renderTagRow();
  document.getElementById('newTagInput').value = '';
  toast(`태그 "${val}" 추가!`);
});

document.getElementById('newTagInput').addEventListener('keydown', e => {
  if (e.key==='Enter') document.getElementById('addTagBtn').click();
});

document.getElementById('tagModalClose').addEventListener('click', () => {
  document.getElementById('tagModal').classList.remove('open');
});


// ──────────────────────────────────────────────
//  성경 검색 (API.Bible / scripture.api.bible)
//  무료 공개 API: getBible.net (별도 키 불필요)

  {k:'EZK',n:'에스겔'},{k:'DAN',n:'다니엘'},{k:'HOS',n:'호세아'},{k:'JOL',n:'요엘'},{k:'AMO',n:'아모스'},

// getBible.net API 매핑 (osis → 영문 약자)
const BOOK_MAP = {
  GEN:'Genesis',EXO:'Exodus',LEV:'Leviticus',NUM:'Numbers',DEU:'Deuteronomy',
  JOS:'Joshua',JDG:'Judges',RUT:'Ruth','1SA':'1Samuel','2SA':'2Samuel',
  '1KI':'1Kings','2KI':'2Kings','1CH':'1Chronicles','2CH':'2Chronicles',EZR:'Ezra',

// 성경책 버튼 그리드 렌더
function renderBibleBookGrid() {
  const grid = document.getElementById('bibleBookGrid');
  grid.innerHTML = '';
  const NT_START = 39; // 신약 시작 인덱스
  BIBLE_BOOKS.forEach((b, i) => {
    if (i === NT_START) {
      const sep = document.createElement('div');
      sep.style.cssText = 'width:100%;font-size:11px;font-weight:700;color:var(--sub);letter-spacing:.5px;padding:4px 0 2px;';
      sep.textContent = '— 신약 —';
      grid.appendChild(sep);
    }
    const btn = document.createElement('button');
    btn.textContent = b.n;
    btn.dataset.key = b.k;
    btn.style.cssText = `padding:5px 10px;border-radius:16px;font-size:12px;font-weight:600;
      border:1.5px solid var(--border);background:var(--bg);color:var(--sub);cursor:pointer;transition:all .15s;`;
    btn.addEventListener('click', () => {
      selectedBook = b;
      grid.querySelectorAll('button').forEach(x => {
        x.style.background = 'var(--bg)';
        x.style.borderColor = 'var(--border)';
        x.style.color = 'var(--sub)';
      });
      btn.style.background = 'var(--blue)';
      btn.style.borderColor = 'var(--blue)';
      btn.style.color = '#fff';
    });
    grid.appendChild(btn);
  });
}

// 성경 API 호출 (getBible.net - 무료, CORS 허용, 개역개정 KRV)
async function fetchBibleVerses(bookKey, chapter, verseRange) {
  const engBook = BOOK_MAP[bookKey];
  if (!engBook) throw new Error('책 이름을 찾을 수 없습니다.');

  // getBible.net: /passage.php?passage=John+3:16&version=kjv
  // 한국어: 개역개정(korHRV) 또는 개역한글(kor)
  const passage = verseRange
    ? `${engBook}+${chapter}:${verseRange.replace('-', '-')}`
    : `${engBook}+${chapter}`;

  const url = `https://getBible.net/json?scripture=${encodeURIComponent(passage)}&version=Korean`;
  const res = await fetch(url);
  if (!res.ok) throw new Error('API 오류: ' + res.status);

  // getBible.net은 JSONP 형식으로 반환되므로 텍스트로 받아 파싱
  let text = await res.text();
  // JSONP 래퍼 제거: 앞 "(" 와 끝 ");" 제거
  text = text.replace(/^\s*\(/, '').replace(/\);\s*$/, '');
  const data = JSON.parse(text);

  // 구절 추출
  const chapterData = data?.book?.[0]?.chapter;
  if (!chapterData) throw new Error('구절을 찾을 수 없습니다.');

  const verses = Object.entries(chapterData).map(([v, d]) => ({
    verse: parseInt(v),
    text: d.verse
  })).sort((a,b) => a.verse - b.verse);

  // 절 범위 필터
  if (verseRange) {
    const parts = verseRange.split('-').map(Number);
    const from = parts[0], to = parts[1] || parts[0];
    return verses.filter(v => v.verse >= from && v.verse <= to);
  }
  return verses;
}

// 성경 검색 실행
async function doSearch() {
  if (!selectedBook) { toast('성경책을 선택해 주세요.'); return; }
  const chapter = document.getElementById('bibleChapter').value.trim();
  if (!chapter) { toast('장을 입력해 주세요.'); return; }
  const verse = document.getElementById('bibleVerse').value.trim();

  const resultEl  = document.getElementById('bibleResult');
  const loadingEl = document.getElementById('bibleLoading');
  const errorEl   = document.getElementById('bibleError');
  const textEl    = document.getElementById('bibleVerseText');

  resultEl.style.display  = 'none';
  errorEl.style.display   = 'none';
  loadingEl.style.display = 'block';

  try {
    const verses = await fetchBibleVerses(selectedBook.k, chapter, verse);
    loadingEl.style.display = 'none';

    if (!verses.length) throw new Error('구절이 없습니다.');

    const ref = verse
      ? `${selectedBook.n} ${chapter}:${verse}`
      : `${selectedBook.n} ${chapter}장`;

    const body = verses.map(v => `${v.verse}절 ${v.text}`).join('\n');
    textEl.dataset.ref  = ref;
    textEl.dataset.body = body;
    textEl.innerHTML = `<strong style="color:var(--blue);font-size:13px;">${ref}</strong><br><br>`
      + verses.map(v => `<span style="color:var(--sub);font-size:12px;">${v.verse}</span> ${v.text}`).join('<br>');
    resultEl.style.display = 'block';
  } catch(e) {
    loadingEl.style.display = 'none';
    errorEl.style.display   = 'block';
    errorEl.textContent     = '⚠️ ' + (e.message || '구절을 불러올 수 없습니다. 인터넷 연결을 확인해 주세요.');
  }
}

// 메모에 삽입
document.getElementById('bibleInsertBtn').addEventListener('click', () => {
  const textEl = document.getElementById('bibleVerseText');
  const ref  = textEl.dataset.ref  || '';
  const body = textEl.dataset.body || '';
  const memo = document.getElementById('memoText');
  const insert = `\n📖 ${ref}\n${body}\n`;
  memo.value = memo.value + insert;
  document.getElementById('bibleModal').classList.remove('open');
  toast('메모에 성경 구절이 삽입되었습니다! 📖');
});

// 복사
document.getElementById('bibleCopyBtn').addEventListener('click', () => {
  const textEl = document.getElementById('bibleVerseText');
  const ref  = textEl.dataset.ref  || '';
  const body = textEl.dataset.body || '';
  navigator.clipboard.writeText(`📖 ${ref}\n${body}`).then(() => toast('복사되었습니다!'));
});

// 버튼 이벤트
document.getElementById('bibleSearchBtn').addEventListener('click', doSearch);
document.getElementById('bibleChapter').addEventListener('keydown', e => { if(e.key==='Enter') doSearch(); });
document.getElementById('bibleVerse').addEventListener('keydown',   e => { if(e.key==='Enter') doSearch(); });

document.getElementById('openBibleBtn').addEventListener('click', () => {
  renderBibleBookGrid();
  document.getElementById('bibleResult').style.display  = 'none';
  document.getElementById('bibleLoading').style.display = 'none';
  document.getElementById('bibleError').style.display   = 'none';
  document.getElementById('bibleChapter').value = '';
  document.getElementById('bibleVerse').value   = '';
  selectedBook = null;
  document.getElementById('bibleModal').classList.add('open');
});

document.getElementById('bibleModalClose').addEventListener('click', () => {

});
